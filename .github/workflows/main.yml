name: RustDesk Server (Secure)

on:
  workflow_dispatch:
    inputs:
      secret_key:
        description: 'Enter secret key'
        required: true
        type: string

jobs:
  rustdesk:
    # فقط أنت + كلمة السر الصحيحة
    if: github.actor == 'YOUR_USERNAME' && github.event.inputs.secret_key == 'YOUR_SECRET_KEY'
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
      - name: Download RustDesk
        shell: pwsh
        run: |
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.2.6/rustdesk-1.2.6-x86_64.exe"
          Invoke-WebRequest $url -OutFile "$env:TEMP\rustdesk.exe" -UseBasicParsing

      - name: Install and Start RustDesk
        shell: pwsh
        run: |
          & "$env:TEMP\rustdesk.exe" --silent-install
          Start-Sleep 20
          & "C:\Program Files\RustDesk\RustDesk.exe" --install-service
          Start-Service RustDesk

      - name: Configure RustDesk
        shell: pwsh
        run: |
          $rdPath = "C:\Program Files\RustDesk"
          $password = "${{ secrets.RUSTDESK_PASSWORD }}"
          
          # تعيين كلمة المرور
          & "$rdPath\RustDesk.exe" --password $password
          Start-Sleep 3
          
          # استخراج ID (مخفي تماماً)
          $id = (& "$rdPath\RustDesk.exe" --get-id | Out-String).Trim()
          
          # إخفاء من Logs بشكل نهائي
          Write-Host "::add-mask::$id"
          Write-Host "::add-mask::$password"
          
          # حفظ في ملف (للخطوة التالية فقط)
          "$id" | Out-File "$env:TEMP\rd_id.txt"

      - name: Send to Telegram (Secure)
        shell: pwsh
        run: |
          $id = Get-Content "$env:TEMP\rd_id.txt"
          $password = "${{ secrets.RUSTDESK_PASSWORD }}"
          
          $botToken = "${{ secrets.TELEGRAM_BOT_TOKEN }}"
          $chatId = "${{ secrets.TELEGRAM_CHAT_ID }}"
          
          # إرسال ID + Password عبر Telegram
          $message = "RustDesk Connection%0AID: $id%0APassword: $password%0ATime: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          
          try {
            $response = Invoke-WebRequest -Uri "https://api.telegram.org/bot$botToken/sendMessage?chat_id=$chatId&text=$message&parse_mode=HTML" -UseBasicParsing
            Write-Host "Sent to Telegram successfully"
          } catch {
            Write-Host "Failed to send Telegram message"
          }

      - name: Keep Alive (30 min)
        shell: pwsh
        run: |
          $end = (Get-Date).AddMinutes(30)
          while ((Get-Date) -lt $end) {
            $service = Get-Service RustDesk -ErrorAction SilentlyContinue
            if ($service -and $service.Status -ne 'Running') {
              Start-Service RustDesk
            }
            Start-Sleep 300
          }
