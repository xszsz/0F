name: RustDesk Server

on:
  workflow_dispatch:

jobs:
  rustdesk:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🔒 Validate Secrets (WIN_PASSWORD Required)
        shell: pwsh
        run: |
          $winPass = "${{ secrets.WIN_PASSWORD }}"
          
          if ([string]::IsNullOrWhiteSpace($winPass)) {
            Write-Host "❌ ERROR: Secret 'WIN_PASSWORD' is missing!"
            Write-Host ""
            Write-Host "Required Secrets:"
            Write-Host "  - TELEGRAM_BOT_TOKEN"
            Write-Host "  - TELEGRAM_CHAT_ID"  
            Write-Host "  - WIN_PASSWORD (REQUIRED)"
            Write-Host ""
            Write-Host "Add it at: Settings → Secrets and variables → Actions"
            exit 1
          }
          
          Write-Host "✅ WIN_PASSWORD is set"

      - name: Download RustDesk
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          
          Write-Host "Downloading RustDesk..."
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.2.6/rustdesk-1.2.6-x86_64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\rustdesk.exe" -UseBasicParsing
          
          $size = (Get-Item "$env:TEMP\rustdesk.exe").Length
          Write-Host "Downloaded: $size bytes"

      - name: Install RustDesk Silently
        shell: pwsh
        run: |
          Write-Host "Installing RustDesk..."
          & "$env:TEMP\rustdesk.exe" --silent-install
          Start-Sleep 20
          
          Write-Host "Installing service..."
          & "C:\Program Files\RustDesk\RustDesk.exe" --install-service
          Start-Sleep 10
          
          Write-Host "Starting service..."
          $service = Get-Service -Name "RustDesk" -ErrorAction SilentlyContinue
          if ($service) {
            Start-Service $service
            Start-Sleep 5
            Write-Host "Service status: $($service.Status)"
          }

      - name: Configure Windows + RustDesk
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WIN_PASSWORD: ${{ secrets.WIN_PASSWORD }}
        run: |
          $rdPath = "C:\Program Files\RustDesk"
          
          # ✅ تغيير كلمة سر Windows فعلياً
          Write-Host "Changing Windows password for runneradmin..."
          try {
            $user = [ADSI]"WinNT://./runneradmin,user"
            $user.SetPassword($env:WIN_PASSWORD)
            $user.SetInfo()
            Write-Host "✅ Windows password changed successfully"
          } catch {
            Write-Host "❌ Failed to change Windows password: $_"
            exit 1
          }
          
          # ✅ تفعيل Remote Desktop (للسماة بتسجيل الدخول بعد الاتصال)
          Write-Host "Enabling Remote Desktop access..."
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          Write-Host "✅ Remote Desktop enabled"
          
          # ✅ توليد كلمة سر عشوائية لـ RustDesk (للاتصال الأولي)
          $rdPassword = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 16 | ForEach-Object { [char]$_ })
          
          Write-Host "Setting RustDesk password..."
          & "$rdPath\RustDesk.exe" --password $rdPassword
          Start-Sleep 3
          
          Write-Host "Getting RustDesk ID..."
          $id = & "$rdPath\RustDesk.exe" --get-id | Out-String
          $id = $id.Trim()
          
          if ([string]::IsNullOrEmpty($id)) {
            $id = cmd /c "cd /d `"$rdPath`" && RustDesk.exe --get-id | more"
            $id = $id.Trim()
          }
          
          # ✅ إرسال المعلومات إلى Telegram
          $message = "🔐 RustDesk Connection Info%0A%0A🆔 ID: $id%0A🔑 RustDesk Password: $rdPassword%0A%0A👤 Windows User: runneradmin%0A🔒 Windows Password: $env:WIN_PASSWORD%0A%0A⏱️ Session: 6 hours%0A%0A📋 Steps:%0A1️⃣ Connect with ID + RustDesk Password%0A2️⃣ If Windows login screen appears, use Windows credentials"
          $telegramUrl = "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage?chat_id=$env:TELEGRAM_CHAT_ID&text=$message&parse_mode=Markdown"
          
          try {
            Invoke-RestMethod -Uri $telegramUrl -Method Get | Out-Null
            Write-Host "✅ Connection info sent to Telegram securely"
          } catch {
            Write-Host "⚠️ Failed to send Telegram message: $_"
            exit 1
          }
          
          # ❌ عدم طباعة أي معلومات حساسة في السجلات
          Write-Host "========================================"
          Write-Host "RUSTDESK CONNECTION INFO"
          Write-Host "========================================"
          Write-Host "ID: [HIDDEN - sent to Telegram]"
          Write-Host "RustDesk Password: [HIDDEN - sent to Telegram]"
          Write-Host "Windows User: runneradmin"
          Write-Host "Windows Password: [HIDDEN - sent to Telegram]"
          Write-Host "========================================"
          Write-Host "Check your Telegram for credentials"
          Write-Host "========================================"
          
          # حفظ للخطوات التالية
          "$id" | Out-File "$env:TEMP\rd_id.txt"
          "$rdPassword" | Out-File "$env:TEMP\rd_pass.txt"

      - name: Keep Alive
        shell: pwsh
        run: |
          $end = (Get-Date).AddHours(6)
          
          Write-Host "Session active for 6 hours..."
          Write-Host "Connection Info: [HIDDEN - check Telegram]"
          
          while ((Get-Date) -lt $end) {
            $rem = $end - (Get-Date)
            Write-Host "Remaining: $($rem.ToString('hh\:mm\:ss'))"
            
            $service = Get-Service -Name "RustDesk" -ErrorAction SilentlyContinue
            if ($service -and $service.Status -ne 'Running') {
              Write-Host "Restarting RustDesk service..."
              Start-Service $service
            }
            
            Start-Sleep 300
          }

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Write-Host "Cleaning up..."
          Get-Service -Name "RustDesk" -ErrorAction SilentlyContinue | Stop-Service -Force
          
          Remove-Item "$env:TEMP\rd_id.txt" -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\rd_pass.txt" -ErrorAction SilentlyContinue
          Write-Host "Sensitive files removed"
          Write-Host "Done"
