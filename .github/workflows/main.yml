name: RustDesk Server

on:
  workflow_dispatch:

jobs:
  rustdesk:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Download RustDesk
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          
          Write-Host "Downloading RustDesk..."
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.2.6/rustdesk-1.2.6-x86_64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\rustdesk.exe" -UseBasicParsing
          
          $size = (Get-Item "$env:TEMP\rustdesk.exe").Length
          Write-Host "Downloaded: $size bytes"

      - name: Install RustDesk Silently
        shell: pwsh
        run: |
          Write-Host "Installing RustDesk..."
          & "$env:TEMP\rustdesk.exe" --silent-install
          Start-Sleep 20
          
          Write-Host "Installing service..."
          & "C:\Program Files\RustDesk\RustDesk.exe" --install-service
          Start-Sleep 10
          
          Write-Host "Starting service..."
          $service = Get-Service -Name "RustDesk" -ErrorAction SilentlyContinue
          if ($service) {
            Start-Service $service
            Start-Sleep 5
            Write-Host "Service status: $($service.Status)"
          }

      - name: Configure and Get ID
        shell: pwsh
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          $rdPath = "C:\Program Files\RustDesk"
          
          # توليد كلمة مرور عشوائية آمنة
          $password = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 16 | ForEach-Object { [char]$_ })
          
          Write-Host "Setting password..."
          & "$rdPath\RustDesk.exe" --password $password
          Start-Sleep 3
          
          Write-Host "Getting RustDesk ID..."
          $id = & "$rdPath\RustDesk.exe" --get-id | Out-String
          $id = $id.Trim()
          
          if ([string]::IsNullOrEmpty($id)) {
            $id = cmd /c "cd /d `"$rdPath`" && RustDesk.exe --get-id | more"
            $id = $id.Trim()
          }
          
          # ✅ إرسال المعلومات إلى Telegram فقط
          $message = "🔐 *RustDesk Connection Info*%0A%0A🆔 *ID:* `$id`%0A🔑 *Password:* `$password`%0A%0A⏱️ Session: 6 hours"
          $telegramUrl = "https://api.telegram.org/bot$env:TELEGRAM_BOT_TOKEN/sendMessage?chat_id=$env:TELEGRAM_CHAT_ID&text=$message&parse_mode=Markdown"
          
          try {
            Invoke-RestMethod -Uri $telegramUrl -Method Get | Out-Null
            Write-Host "✅ Connection info sent to Telegram securely"
          } catch {
            Write-Host "⚠️ Failed to send Telegram message: $_"
          }
          
          # ❌ عدم طباعة أي معلومات حساسة في السجلات
          Write-Host "========================================"
          Write-Host "RUSTDESK CONNECTION INFO"
          Write-Host "========================================"
          Write-Host "ID: [HIDDEN - sent to Telegram]"
          Write-Host "Password: [HIDDEN - sent to Telegram]"
          Write-Host "========================================"
          Write-Host "Check your Telegram for credentials"
          Write-Host "========================================"
          
          # حفظ للخطوات التالية (ملفات محلية فقط)
          "$id" | Out-File "$env:TEMP\rd_id.txt"
          "$password" | Out-File "$env:TEMP\rd_pass.txt"

      - name: Keep Alive
        shell: pwsh
        run: |
          $end = (Get-Date).AddHours(6)
          
          Write-Host "Session active for 6 hours..."
          Write-Host "Connection Info: [HIDDEN - check Telegram]"
          
          while ((Get-Date) -lt $end) {
            $rem = $end - (Get-Date)
            Write-Host "Remaining: $($rem.ToString('hh\:mm\:ss'))"
            
            $service = Get-Service -Name "RustDesk" -ErrorAction SilentlyContinue
            if ($service -and $service.Status -ne 'Running') {
              Write-Host "Restarting RustDesk service..."
              Start-Service $service
            }
            
            Start-Sleep 300
          }

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Write-Host "Cleaning up..."
          Get-Service -Name "RustDesk" -ErrorAction SilentlyContinue | Stop-Service -Force
          
          # حذف الملفات المؤقتة
          Remove-Item "$env:TEMP\rd_id.txt" -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\rd_pass.txt" -ErrorAction SilentlyContinue
          Write-Host "Sensitive files removed"
          Write-Host "Done"
