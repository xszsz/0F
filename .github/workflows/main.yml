import os
import re
import time
import base64
import secrets
import string
import subprocess
from datetime import datetime, timedelta

import requests
from Crypto.Cipher import AES
from Crypto.Util.Padding import pad
from Crypto.Random import get_random_bytes

# =========================================================
# إعدادات Telegram
# =========================================================

BOT_TOKEN = os.getenv("BOT_TOKEN", "YOUR_BOT_TOKEN")
CHAT_ID = os.getenv("CHAT_ID", "YOUR_CHAT_ID")

# =========================================================
# إعدادات عامة
# =========================================================

AES_KEY = os.getenv(
    "AES_KEY",
    "THIS_IS_MY_32_BYTE_SECRET_KEY!"
).encode()

SESSION_FILE = "session_info.json"

# =========================================================
# أدوات مساعدة
# =========================================================

def safe_print(msg):
    print(f"[{datetime.now().strftime('%H:%M:%S')}] {msg}")


def generate_credentials():
    username = "rdp_" + ''.join(
        secrets.choice(string.ascii_lowercase + string.digits)
        for _ in range(8)
    )

    password_chars = (
        string.ascii_letters +
        string.digits +
        "!@#$%^&*"
    )

    password = ''.join(
        secrets.choice(password_chars)
        for _ in range(16)
    )

    return username, password


def validate_cloudflare_url(url):
    pattern = r"^https:\/\/[a-zA-Z0-9\-]+\.trycloudflare\.com$"
    return bool(re.match(pattern, url))


# =========================================================
# تشفير AES آمن
# =========================================================

def encrypt_data(data: str) -> str:
    """
    AES-256-CBC + IV عشوائي
    """

    key = AES_KEY.ljust(32, b'\0')[:32]

    iv = get_random_bytes(16)

    cipher = AES.new(
        key,
        AES.MODE_CBC,
        iv=iv
    )

    encrypted = cipher.encrypt(
        pad(data.encode(), AES.block_size)
    )

    final = base64.b64encode(iv + encrypted).decode()

    return final


# =========================================================
# Telegram
# =========================================================

def send_to_telegram(message):

    if "YOUR_BOT_TOKEN" in BOT_TOKEN:
        safe_print("ضع BOT_TOKEN الحقيقي")
        return

    url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"

    payload = {
        "chat_id": CHAT_ID,
        "text": message
    }

    try:
        response = requests.post(
            url,
            json=payload,
            timeout=10
        )

        if response.status_code == 200:
            safe_print("تم الإرسال إلى Telegram")
        else:
            safe_print(
                f"فشل الإرسال: {response.status_code}"
            )

    except Exception as e:
        safe_print(f"Telegram Error: {e}")


# =========================================================
# فحص Windows
# =========================================================

def check_windows():

    if os.name != "nt":
        return False

    try:
        result = subprocess.run(
            "systeminfo",
            capture_output=True,
            text=True,
            shell=True
        )

        return (
            "Microsoft" in result.stdout
            and
            "Windows" in result.stdout
        )

    except Exception:
        return False


# =========================================================
# إنشاء مستخدم RDP
# =========================================================

def create_rdp_user(username, password):

    commands = [

        ["net", "user", username, password, "/add"],

        [
            "net",
            "localgroup",
            "Remote Desktop Users",
            username,
            "/add"
        ]
    ]

    for cmd in commands:

        result = subprocess.run(
            cmd,
            capture_output=True,
            text=True
        )

        if result.returncode != 0:
            raise Exception(
                f"فشل تنفيذ الأمر:\n{result.stderr}"
            )

    safe_print(f"تم إنشاء المستخدم: {username}")


# =========================================================
# حذف المستخدم
# =========================================================

def delete_rdp_user(username):

    result = subprocess.run(
        ["net", "user", username, "/delete"],
        capture_output=True,
        text=True
    )

    if result.returncode == 0:
        safe_print(f"تم حذف المستخدم: {username}")
    else:
        safe_print(
            f"تعذر حذف المستخدم:\n{result.stderr}"
        )


# =========================================================
# حفظ الجلسة
# =========================================================

def save_session(data):

    with open(SESSION_FILE, "w", encoding="utf-8") as f:
        json_data = {
            "username": data["username"],
            "end_time": data["end_time"]
        }

        import json

        json.dump(
            json_data,
            f,
            indent=4,
            ensure_ascii=False
        )


# =========================================================
# البرنامج الرئيسي
# =========================================================

def main():

    safe_print("بدء التشغيل")

    if not check_windows():

        send_to_telegram(
            "⚠️ النظام الحالي ليس Windows"
        )

        return

    # -----------------------------------------------------

    try:
        hours = float(
            input("مدة الجلسة بالساعات: ")
        )

        if hours <= 0:
            raise ValueError

    except ValueError:

        safe_print("مدة غير صالحة")
        return

    # -----------------------------------------------------

    user, pwd = generate_credentials()

    # -----------------------------------------------------

    trycloudflare_link = input(
        "رابط TryCloudflare: "
    ).strip()

    if not validate_cloudflare_url(
        trycloudflare_link
    ):

        safe_print(
            "رابط TryCloudflare غير صالح"
        )

        return

    # -----------------------------------------------------

    try:

        create_rdp_user(user, pwd)

    except Exception as e:

        safe_print(str(e))
        return

    # -----------------------------------------------------

    encrypted_user = encrypt_data(user)
    encrypted_pwd = encrypt_data(pwd)
    encrypted_link = encrypt_data(
        trycloudflare_link
    )

    # -----------------------------------------------------

    end_time = (
        datetime.now() +
        timedelta(hours=hours)
    )

    save_session({
        "username": user,
        "end_time": str(end_time)
    })

    # -----------------------------------------------------

    report = f"""
🔐 RDP Session Created

👤 USER:
{encrypted_user}

🔑 PASSWORD:
{encrypted_pwd}

🌐 LINK:
{encrypted_link}

⏳ DURATION:
{hours} hours

🕒 END:
{end_time}
"""

    send_to_telegram(report)

    # -----------------------------------------------------

    safe_print("تم تشغيل الجلسة")
    safe_print(f"المستخدم: {user}")
    safe_print(f"تنتهي: {end_time}")

    # -----------------------------------------------------

    try:

        time.sleep(hours * 3600)

    except KeyboardInterrupt:

        safe_print("تم إيقاف السكربت يدويًا")

    finally:

        delete_rdp_user(user)

        send_to_telegram(
            f"⏰ انتهت جلسة المستخدم: {user}"
        )


# =========================================================

if __name__ == "__main__":
    main()
